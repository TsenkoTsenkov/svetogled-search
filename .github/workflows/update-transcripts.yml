name: Weekly Transcript Update

# Checks for new Светоглед episodes, transcribes them,
# commits to the repo, which triggers the deploy workflow.

on:
  schedule:
    - cron: '0 6 * * 3'  # Every Wednesday 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # YouTube blocks anonymous downloads from datacenter IPs (GitHub runners),
    # so every yt-dlp call authenticates with cookies. Scripts read this path
    # and pass --cookies when the file exists; locally it's unset and ignored.
    env:
      YTDLP_COOKIES: ${{ github.workspace }}/cookies.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yt-dlp youtube-transcript-api
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -z "$YOUTUBE_COOKIES" ]; then
            echo "::error::YOUTUBE_COOKIES secret is empty or unset. Add it in" \
                 "Settings → Secrets and variables → Actions. Without it, YouTube" \
                 "blocks downloads from GitHub's IPs and transcription cannot run."
            exit 1
          fi
          printf '%s\n' "$YOUTUBE_COOKIES" > "$YTDLP_COOKIES"
          # Netscape cookie jars must start with this header line.
          if ! head -n1 "$YTDLP_COOKIES" | grep -q "# Netscape HTTP Cookie File\|# HTTP Cookie File"; then
            echo "::warning::cookies.txt does not start with the Netscape header." \
                 "If yt-dlp rejects it, re-export with a 'Netscape format' cookie tool."
          fi
          echo "Wrote $(wc -l < "$YTDLP_COOKIES") cookie lines."

      - name: Check for new episodes
        id: check
        run: python scripts/check_new_episodes.py

      - name: Fetch transcripts via YouTube API
        if: steps.check.outputs.new_count > 0
        run: python scripts/fetch_new_transcripts.py

      - name: Build Whisper CLI for remaining videos
        if: steps.check.outputs.new_count > 0
        run: |
          # Build whisper.cpp from source (no prebuilt Linux binaries available)
          git clone --depth 1 --branch v1.8.4 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-cpp
          cd /tmp/whisper-cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/whisper-cli
          cd $GITHUB_WORKSPACE
          chmod +x whisper-cli
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o ggml-small.bin

      - name: Transcribe remaining with Whisper
        if: steps.check.outputs.new_count > 0
        run: python scripts/whisper_remaining.py

      - name: Fix common transcription errors
        if: steps.check.outputs.new_count > 0
        run: |
          # Apply Bulgarian corrections only to the newly added transcripts.
          # scripts/correct_transcripts.py takes transcript file paths as args.
          python - <<'PY'
          import json, subprocess, sys
          from pathlib import Path

          videos = json.loads(Path("new_videos.json").read_text(encoding="utf-8"))
          files = [
              str(p) for v in videos
              if (p := Path("transcripts") / f"{v['id']}.json").exists()
          ]
          if not files:
              print("No new transcript files to correct.")
              sys.exit(0)
          print(f"Correcting {len(files)} new transcript(s)...")
          subprocess.run([sys.executable, "scripts/correct_transcripts.py", *files], check=True)
          PY

      - name: Normalize titles and add playlist order
        if: steps.check.outputs.new_count > 0
        run: python scripts/normalize_titles.py

      - name: Regenerate theme map
        if: steps.check.outputs.new_count > 0
        run: python scripts/generate_themes.py

      - name: Commit and push new transcripts
        if: steps.check.outputs.new_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ themes.json
          if git diff --staged --quiet; then
            echo "No new transcripts to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add ${COUNT} new transcript(s) from weekly update"
            git push
          fi
          # The push will trigger the deploy workflow automatically

      - name: Remove cookie file
        if: always()
        run: rm -f "$YTDLP_COOKIES"
