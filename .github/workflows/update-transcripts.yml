name: Update Transcripts

on:
  schedule:
    # Every Sunday at 6:00 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yt-dlp youtube-transcript-api
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check for new episodes
        id: check
        run: python scripts/check_new_episodes.py

      - name: Fetch transcripts (YouTube API)
        if: steps.check.outputs.new_count > 0
        run: python scripts/fetch_new_transcripts.py

      - name: Install Whisper for remaining
        if: steps.check.outputs.new_count > 0
        run: |
          # Install whisper.cpp
          curl -L https://github.com/ggerganov/whisper.cpp/releases/download/v1.8.4/whisper-cli-linux-x86_64.tar.gz | tar xz
          chmod +x whisper-cli
          # Download small model (fits in GitHub Actions memory)
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o ggml-small.bin

      - name: Transcribe remaining with Whisper
        if: steps.check.outputs.new_count > 0
        run: python scripts/whisper_remaining.py

      - name: Commit new transcripts
        if: steps.check.outputs.new_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          if git diff --staged --quiet; then
            echo "No new transcripts to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add ${COUNT} new transcript(s) from weekly update"
            git push
          fi

      - name: Trigger Cloud Run redeploy
        if: steps.check.outputs.new_count > 0
        env:
          GCP_PROJECT: svetogled-arhiv
          GCP_REGION: europe-west1
          GCP_SERVICE: svetogled-search
        run: |
          # Cloud Run will be redeployed on next push via a separate workflow
          # or we can trigger it here if we set up GCP credentials
          echo "New transcripts committed. Cloud Run will pick them up on next deploy."
