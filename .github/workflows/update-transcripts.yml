name: Weekly Transcript Update

# Checks for new Светоглед episodes, transcribes them,
# commits to the repo, which triggers the deploy workflow.

on:
  schedule:
    - cron: '0 6 * * 3'  # Every Wednesday 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yt-dlp youtube-transcript-api
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check for new episodes
        id: check
        run: python scripts/check_new_episodes.py

      - name: Fetch transcripts via YouTube API
        if: steps.check.outputs.new_count > 0
        run: python scripts/fetch_new_transcripts.py

      - name: Build Whisper CLI for remaining videos
        if: steps.check.outputs.new_count > 0
        run: |
          # Build whisper.cpp from source (no prebuilt Linux binaries available)
          git clone --depth 1 --branch v1.8.4 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-cpp
          cd /tmp/whisper-cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/whisper-cli
          cd $GITHUB_WORKSPACE
          chmod +x whisper-cli
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o ggml-small.bin

      - name: Transcribe remaining with Whisper
        if: steps.check.outputs.new_count > 0
        run: python scripts/whisper_remaining.py

      - name: Fix common transcription errors
        if: steps.check.outputs.new_count > 0
        run: python fix_transcriptions.py --skip-combined

      - name: Normalize titles and add playlist order
        if: steps.check.outputs.new_count > 0
        run: python scripts/normalize_titles.py

      - name: Commit and push new transcripts
        if: steps.check.outputs.new_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          if git diff --staged --quiet; then
            echo "No new transcripts to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add ${COUNT} new transcript(s) from weekly update"
            git push
          fi
          # The push will trigger the deploy workflow automatically
