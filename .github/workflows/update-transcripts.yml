name: Weekly Transcript Update

# Checks for new Светоглед episodes, transcribes them,
# commits to the repo, which triggers the deploy workflow.

on:
  schedule:
    - cron: '0 6 * * 3'  # Every Wednesday 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # allows the job to re-trigger itself to drain the backlog

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # YouTube blocks anonymous downloads from datacenter IPs (GitHub runners),
    # so every yt-dlp call authenticates with cookies. Scripts read this path
    # and pass --cookies when the file exists; locally it's unset and ignored.
    env:
      YTDLP_COOKIES: ${{ github.workspace }}/cookies.txt
      # CPU Whisper is ~real-time, so cap each run to a couple of episodes to
      # stay under the job timeout; the job re-triggers itself for the rest.
      WHISPER_MAX_PER_RUN: '2'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # yt-dlp[default] bundles the EJS challenge-solver package.
          pip install "yt-dlp[default]" youtube-transcript-api
          sudo apt-get update && sudo apt-get install -y ffmpeg

      # YouTube now gates audio formats behind a JS ("nsig") challenge. yt-dlp
      # fetches the EJS solver via --remote-components ejs:github, but needs a
      # JS RUNTIME to execute it. Without Deno, only image formats are offered
      # and audio download fails with "Requested format is not available" — the
      # exact failure that silently dropped Беседи 288-291.
      - name: Install Deno (JS runtime for yt-dlp's EJS solver)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -z "$YOUTUBE_COOKIES" ]; then
            echo "::error::YOUTUBE_COOKIES secret is empty or unset. Add it in" \
                 "Settings → Secrets and variables → Actions. Without it, YouTube" \
                 "blocks downloads from GitHub's IPs and transcription cannot run."
            exit 1
          fi
          printf '%s\n' "$YOUTUBE_COOKIES" > "$YTDLP_COOKIES"
          # Netscape cookie jars must start with this header line.
          if ! head -n1 "$YTDLP_COOKIES" | grep -q "# Netscape HTTP Cookie File\|# HTTP Cookie File"; then
            echo "::warning::cookies.txt does not start with the Netscape header." \
                 "If yt-dlp rejects it, re-export with a 'Netscape format' cookie tool."
          fi
          echo "Wrote $(wc -l < "$YTDLP_COOKIES") cookie lines."

      - name: Check for new episodes
        id: check
        run: python scripts/check_new_episodes.py

      - name: Fetch transcripts via YouTube API
        if: steps.check.outputs.new_count > 0
        run: python scripts/fetch_new_transcripts.py

      - name: Build Whisper CLI for remaining videos
        if: steps.check.outputs.new_count > 0
        run: |
          # Build whisper.cpp from source (no prebuilt Linux binaries available)
          git clone --depth 1 --branch v1.8.4 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper-cpp
          cd /tmp/whisper-cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/whisper-cli
          cd $GITHUB_WORKSPACE
          chmod +x whisper-cli
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o ggml-small.bin

      - name: Transcribe remaining with Whisper
        if: steps.check.outputs.new_count > 0
        run: python scripts/whisper_remaining.py

      - name: Fix common transcription errors
        if: steps.check.outputs.new_count > 0
        run: |
          # Apply Bulgarian corrections only to the newly added transcripts.
          # scripts/correct_transcripts.py takes transcript file paths as args.
          python - <<'PY'
          import json, subprocess, sys
          from pathlib import Path

          videos = json.loads(Path("new_videos.json").read_text(encoding="utf-8"))
          files = [
              str(p) for v in videos
              if (p := Path("transcripts") / f"{v['id']}.json").exists()
          ]
          if not files:
              print("No new transcript files to correct.")
              sys.exit(0)
          print(f"Correcting {len(files)} new transcript(s)...")
          subprocess.run([sys.executable, "scripts/correct_transcripts.py", *files], check=True)
          PY

      - name: Normalize titles and add playlist order
        if: steps.check.outputs.new_count > 0
        run: python scripts/normalize_titles.py

      - name: Regenerate theme map
        if: steps.check.outputs.new_count > 0
        run: python scripts/generate_themes.py

      - name: Commit and push new transcripts
        if: steps.check.outputs.new_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ themes.json
          if git diff --staged --quiet; then
            # new_count > 0 got us here, yet nothing was produced — transcription
            # failed (e.g. YouTube blocked audio download). Fail LOUDLY instead
            # of the old silent "success", which hid Беседи 288-291 for weeks.
            echo "::error::${{ steps.check.outputs.new_count }} new episode(s) were" \
                 "detected but NONE were transcribed — nothing to commit. The audio" \
                 "download or transcription step failed (check YOUTUBE_COOKIES and the" \
                 "yt-dlp/EJS logs above). Failing the job so this is not silently missed."
            exit 1
          fi
          COUNT=$(git diff --staged --name-only | wc -l)
          git commit -m "Add ${COUNT} new transcript(s) from weekly update"
          git push
          # The push will trigger the deploy workflow automatically

      # If Whisper capped this run (WHISPER_MAX_PER_RUN) and episodes still
      # remain, re-trigger this same workflow so the backlog drains over a few
      # short runs instead of one run that times out. The just-pushed commit
      # means the next run's check sees fewer "new" episodes.
      - name: Re-trigger if episodes remain
        if: steps.check.outputs.new_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Recompute the backlog against the transcripts we just committed.
          git pull --quiet --rebase origin main || true
          REMAINING=$(python scripts/check_new_episodes.py 2>/dev/null \
            | grep -oE 'New episodes: [0-9]+' | grep -oE '[0-9]+' || echo 0)
          echo "Episodes still needing transcription: ${REMAINING:-0}"
          if [ "${REMAINING:-0}" -gt 0 ]; then
            echo "Re-triggering weekly update to process the remaining ${REMAINING}."
            gh workflow run update-transcripts.yml
          else
            echo "Backlog empty — all new episodes transcribed."
          fi

      - name: Remove cookie file
        if: always()
        run: rm -f "$YTDLP_COOKIES"
