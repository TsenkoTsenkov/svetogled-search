name: Weekly Transcript Update

# Checks for new Светоглед episodes, transcribes them,
# commits to the repo, which triggers the deploy workflow.

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yt-dlp youtube-transcript-api
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check for new episodes
        id: check
        run: python scripts/check_new_episodes.py

      - name: Fetch transcripts via YouTube API
        if: steps.check.outputs.new_count > 0
        run: python scripts/fetch_new_transcripts.py

      - name: Install Whisper for remaining videos
        if: steps.check.outputs.new_count > 0
        run: |
          curl -L https://github.com/ggerganov/whisper.cpp/releases/download/v1.8.4/whisper-cli-linux-x86_64.tar.gz | tar xz || true
          chmod +x whisper-cli 2>/dev/null || true
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o ggml-small.bin || true

      - name: Transcribe remaining with Whisper
        if: steps.check.outputs.new_count > 0
        run: python scripts/whisper_remaining.py

      - name: Commit and push new transcripts
        if: steps.check.outputs.new_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          if git diff --staged --quiet; then
            echo "No new transcripts to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add ${COUNT} new transcript(s) from weekly update"
            git push
          fi
          # The push will trigger the deploy workflow automatically
