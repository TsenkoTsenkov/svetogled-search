name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'transcripts/**'
      - 'search_app.py'
      - 'index.html'
      - 'index_to_meili.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: sudo /opt/svetogled-search/update.sh
