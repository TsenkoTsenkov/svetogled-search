name: Deploy to EC2

# Triggered when code or transcripts change on main.
# SSHs into the EC2 instance and runs update.sh from the repo.

on:
  push:
    branches: [main]
    paths:
      - 'transcripts/**'
      - 'search_app.py'
      - 'index.html'
      - 'themes.json'
      - 'static/**'
      - 'index_to_meili.py'
      - 'update.sh'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install meilisearch pillow
      - name: Run tests (markup contract + static assets; server tests self-skip)
        run: python test_search.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: sudo /opt/svetogled-search/update.sh
