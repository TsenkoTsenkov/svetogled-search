name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'transcripts/**'
      - 'search_app.py'
      - 'index.html'
      - 'index_to_meili.py'
      - 'Dockerfile'
      - 'start.sh'
  workflow_dispatch:

env:
  GCP_PROJECT: svetogled-arhiv
  GCP_REGION: europe-west1
  GCP_SERVICE: svetogled-search

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $GCP_SERVICE \
            --source=. \
            --region=$GCP_REGION \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080 \
            --project=$GCP_PROJECT
