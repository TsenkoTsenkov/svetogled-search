<script>
const MEILI_URL = window.location.origin + '/meili';
const MEILI_KEY = 'svetogled-search-key';
const INDEX = 'segments';

const searchInput = document.getElementById('search-input');
const resultsDiv = document.getElementById('results');
const statsDiv = document.getElementById('stats');
const spinner = document.getElementById('spinner');
const filterSelect = document.getElementById('filter-video');
const exportBtn = document.getElementById('export-btn');

let debounceTimer;
let currentQuery = '';
let lastResults = [];
const transcriptCache = {};
let episodesData = null;
let topicsData = null;
let exactMode = false;
var scrollObserver = null;
var searchGeneration = 0;

function buildGroupHtml(group, videoId, groupIdx, delay) {
    var tid = 'transcript-' + groupIdx;
    var playerId = 'player-' + groupIdx;
    var segListId = 'seglist-' + groupIdx;
    var maxVisible = 3;
    var hasMore = group.segments.length > maxVisible;

    var html = '<div class="video-group" data-video-id="' + videoId + '" data-transcript-id="' + tid + '" style="animation-delay: ' + delay + 's">';
    html += '<div class="video-group-header" style="cursor:pointer" onclick="toggleTranscript(\'' + videoId + '\', \'' + tid + '\', this.closest(\'.video-group\').querySelector(\'.group-btn-expand\'))">';
    html += '<span class="video-group-title">' + escapeHtml(group.title) + '</span>';
    html += '<span class="video-group-badge">' + group.segments.length + ' съвпадения</span>';
    html += '</div>';

    html += '<div class="group-toolbar">';
    html += '<a class="group-btn group-btn-yt" href="https://www.youtube.com/watch?v=' + videoId + '" target="_blank" rel="noopener noreferrer">&#9654; YouTube</a>';
    html += '<a class="group-btn group-btn-episode" href="/episode/' + videoId + '">Епизод &rarr;</a>';
    html += '<button class="group-btn group-btn-expand" onclick="toggleTranscript(\'' + videoId + '\', \'' + tid + '\', this)"><span class="arrow">&#9660;</span> Пълен текст</button>';
    html += '<button class="group-btn group-btn-fullscreen" onclick="openGroupFullscreen(\'' + videoId + '\', \'' + tid + '\', this)" title="Цял екран">&#9634; Цял екран</button>';
    html += '<button class="group-btn group-btn-dismiss" onclick="hideGroup(\'' + videoId + '\', \'' + escapeAttr(group.title) + '\', this)">&#10005; Скрий</button>';
    html += '</div>';

    html += '<div class="segment-list" id="' + segListId + '">';

    group.segments.forEach(function(seg, segIdx) {
        var highlighted = seg._formatted ? seg._formatted.text : seg.text;
        var hidden = (hasMore && segIdx >= maxVisible) ? ' style="display:none" data-extra="true"' : '';
        html += '<div class="segment-item"' + hidden + '>';
        html += '<button class="play-btn" onclick="playSegment(\'' + videoId + '\', ' + seg.start_seconds + ', \'' + playerId + '\')" title="Пусни от ' + seg.timestamp + '">&#9654;</button>';
        html += '<span class="segment-ts"><a href="' + seg.youtube_url + '" target="_blank" rel="noopener noreferrer">' + seg.timestamp + '</a></span>';
        html += '<span class="segment-text">' + highlighted + '</span>';
        html += '</div>';
    });

    html += '</div>';

    if (hasMore) {
        html += '<button class="show-more-btn" onclick="showMoreSegments(\'' + segListId + '\', this)">Покажи всички ' + group.segments.length + ' съвпадения &#9660;</button>';
    }

    html += '<div class="yt-player-wrapper" id="' + playerId + '"></div>';
    html += '<div class="full-transcript" id="' + tid + '"></div>';
    html += '</div>';

    return html;
}

// Hidden groups tracking
var hiddenGroups = {}; // { videoId: title }

// ── Init ──
fetch(MEILI_URL + '/indexes/' + INDEX + '/stats', {
    headers: { 'Authorization': 'Bearer ' + MEILI_KEY }
})
.then(function(r) { return r.json(); })
.then(function(data) {
    statsDiv.textContent = data.numberOfDocuments.toLocaleString() + ' сегмента индексирани';
})
.catch(function() {
    statsDiv.textContent = 'Meilisearch не е достъпен';
    statsDiv.style.color = '#e94560';
});

// Load episodes for filter
fetch('/api/episodes')
    .then(function(r) { return r.json(); })
    .then(function(episodes) {
        episodesData = episodes;
        episodes.forEach(function(ep) {
            var opt = document.createElement('option');
            opt.value = ep.video_id;
            var label = ep.title;
            if (!/\(Беседа\s+\d+\)/.test(label) && ep.episode_number > 0) {
                label += ' (Беседа ' + ep.episode_number + ')';
            }
            opt.textContent = label.length > 60 ? label.substring(0, 57) + '...' : label;
            filterSelect.appendChild(opt);
        });
        // Show empty state if no active search
        if (!searchInput.value.trim()) showEmptyState();
    });

function showEmptyState() {
    if (!episodesData || episodesData.length === 0) return;
    // Get last 5 episodes by episode_number
    var recent = episodesData.slice().sort(function(a, b) {
        return (b.episode_number || 0) - (a.episode_number || 0);
    }).slice(0, 5);

    var episodeCount = episodesData.length;

    var html = '<div class="empty-state">';
    html += '<p class="empty-hint desktop-only"><kbd>/</kbd> търсене &middot; <kbd>&uarr;</kbd><kbd>&darr;</kbd> навигация &middot; <kbd>Enter</kbd> пълен текст &middot; <kbd>Esc</kbd> затвори &middot; <kbd>Backspace</kbd> скрий &middot; <kbd>&larr;</kbd><kbd>&rarr;</kbd> менюта</p>';
    html += '<h2>Последни епизоди от общо ' + episodeCount + '</h2>';
    recent.forEach(function(ep, idx) {
        var displayTitle = ep.title;
        if (!/\(Беседа\s+\d+\)/.test(displayTitle) && ep.episode_number > 0) {
            displayTitle += ' (Беседа ' + ep.episode_number + ')';
        }
        var delay = idx * 0.06;
        var tid = 'recent-transcript-' + idx;
        html += '<div class="video-group" data-video-id="' + ep.video_id + '" data-transcript-id="' + tid + '" style="animation-delay:' + delay + 's">';
        html += '<div class="video-group-header" style="cursor:pointer" onclick="toggleTranscript(\'' + ep.video_id + '\', \'' + tid + '\', this.closest(\'.video-group\').querySelector(\'.group-btn-expand\'))">';
        html += '<span class="video-group-title">' + escapeHtml(displayTitle) + '</span>';
        html += '<span class="episode-segments">' + ep.segment_count + ' сегм.</span>';
        html += '</div>';
        html += '<div class="group-toolbar">';
        html += '<a class="group-btn group-btn-yt" href="https://www.youtube.com/watch?v=' + ep.video_id + '" target="_blank" rel="noopener noreferrer">&#9654; YouTube</a>';
        html += '<a class="group-btn group-btn-episode" href="/episode/' + ep.video_id + '">Епизод &rarr;</a>';
        html += '<button class="group-btn group-btn-expand" onclick="toggleTranscript(\'' + ep.video_id + '\', \'' + tid + '\', this)"><span class="arrow">&#9660;</span> Пълен текст</button>';
        html += '<button class="group-btn group-btn-fullscreen" onclick="openGroupFullscreen(\'' + ep.video_id + '\', \'' + tid + '\', this)" title="Цял екран">&#9634; Цял екран</button>';
        html += '<button class="group-btn group-btn-dismiss" onclick="this.closest(\'.video-group\').style.display=\'none\'">&#10005; Скрий</button>';
        html += '</div>';
        html += '<div class="full-transcript" id="' + tid + '"></div>';
        html += '</div>';
    });
    html += '</div>';
    resultsDiv.innerHTML = html;

    // Update footer count dynamically
    var footerDiv = document.querySelector('.site-footer');
    if (footerDiv) {
        var countDiv = footerDiv.querySelectorAll('div')[1];
        if (countDiv) countDiv.textContent = 'Търсене в транскрипции на ' + episodeCount + ' епизода';
    }
}

// ── Navigation ──
document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var page = btn.getAttribute('data-page');
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
        document.getElementById('page-' + page).classList.add('active');
        btn.classList.add('active');

        if (page === 'episodes' && episodesData) renderEpisodes();
        if (page === 'topics' && !topicsData) loadTopics();
    });
});

// ── Search ──
searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 250);
});
searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(debounceTimer); doSearch(); }
});
filterSelect.addEventListener('change', function() {
    if (searchInput.value.trim()) doSearch();
});
exportBtn.addEventListener('click', exportResults);

document.getElementById('exact-toggle').addEventListener('click', function() {
    exactMode = !exactMode;
    this.classList.toggle('active', exactMode);
    if (searchInput.value.trim()) doSearch();
});

// Sticky search bar shadow on scroll
var backToTopBtn = document.getElementById('back-to-top');
backToTopBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});
window.addEventListener('scroll', function() {
    var searchBar = document.querySelector('.search-container');
    var epSticky = document.querySelector('.episodes-sticky');
    var scrolled = window.scrollY > 10;
    if (searchBar) searchBar.classList.toggle('scrolled', scrolled);
    if (epSticky) epSticky.classList.toggle('scrolled', scrolled);
    backToTopBtn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

function doSearch() {
    var query = searchInput.value.trim();
    if (!query) {
        statsDiv.textContent = '';
        spinner.classList.remove('active');
        currentQuery = '';
        lastResults = [];
        showEmptyState();
        return;
    }

    currentQuery = query;
    var thisGeneration = ++searchGeneration;
    spinner.classList.add('active');
    hiddenGroups = {};
    updateHiddenBar();
    if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }

    var videoFilter = filterSelect.value;
    var searchQuery = exactMode ? '"' + query + '"' : query;
    var baseBody = {
        q: searchQuery,
        attributesToHighlight: ['text'],
        highlightPreTag: '<em>',
        highlightPostTag: '</em>',
        attributesToCrop: ['text'],
        cropLength: 80
    };
    if (videoFilter) {
        baseBody.filter = 'video_id = "' + videoFilter + '"';
    }

    // Fetch all results by paginating through offset/limit
    var PAGE_SIZE = 1000;
    var allHits = [];
    var totalEstimate = 0;
    var searchTime = 0;

    function fetchPage(offset) {
        var body = Object.assign({}, baseBody, { limit: PAGE_SIZE, offset: offset });
        return fetch(MEILI_URL + '/indexes/' + INDEX + '/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + MEILI_KEY
            },
            body: JSON.stringify(body)
        }).then(function(r) { return r.json(); });
    }

    function fetchAllPages() {
        return fetchPage(0).then(function(data) {
            if (thisGeneration !== searchGeneration) return;

            totalEstimate = data.estimatedTotalHits || data.hits.length;
            searchTime = data.processingTimeMs;
            allHits = data.hits;

            // Sequentially fetch remaining pages
            function fetchNext(offset) {
                if (offset >= totalEstimate || offset >= 10000) return Promise.resolve();
                if (thisGeneration !== searchGeneration) return Promise.resolve();
                return fetchPage(offset).then(function(page) {
                    if (thisGeneration !== searchGeneration) return;
                    if (page.hits.length === 0) return;
                    allHits = allHits.concat(page.hits);
                    if (page.hits.length < PAGE_SIZE) return;
                    return fetchNext(offset + PAGE_SIZE);
                });
            }

            if (allHits.length >= PAGE_SIZE) {
                return fetchNext(PAGE_SIZE);
            }
        });
    }

    fetchAllPages()
    .then(function() {
        if (thisGeneration !== searchGeneration) return;
        spinner.classList.remove('active');

        statsDiv.textContent = totalEstimate + ' резултата за \u201E' + query + '\u201C (' + searchTime + 'ms)';

        lastResults = allHits;

        if (allHits.length === 0) {
            resultsDiv.innerHTML = '<div class="no-results">Няма намерени резултати</div>';
            return;
        }

        // Group by video
        var groups = new Map();
        allHits.forEach(function(hit) {
            if (!groups.has(hit.video_id)) {
                groups.set(hit.video_id, {
                    video_id: hit.video_id,
                    title: hit.title,
                    source: hit.source,
                    segments: []
                });
            }
            if (hit.text && hit.text.length > 1500) return;
            groups.get(hit.video_id).segments.push(hit);
        });

        // Convert to array for progressive rendering
        var allGroups = [];
        groups.forEach(function(group, videoId) {
            if (group.segments.length === 0) return;
            allGroups.push({ videoId: videoId, group: group });
        });

        // Update stats with episode count
        statsDiv.textContent = totalEstimate + ' резултата в ' + allGroups.length + ' епизода за \u201E' + query + '\u201C (' + searchTime + 'ms)';

        // Render first batch immediately, rest on scroll
        var BATCH_SIZE = 20;
        var renderedCount = 0;

        function renderBatch() {
            var end = Math.min(renderedCount + BATCH_SIZE, allGroups.length);
            var html = '';
            for (var i = renderedCount; i < end; i++) {
                var videoId = allGroups[i].videoId;
                var group = allGroups[i].group;
                var delay = Math.min((i - renderedCount) * 0.04, 0.4);
                html += buildGroupHtml(group, videoId, i, delay);
            }
            if (renderedCount === 0) {
                resultsDiv.innerHTML = html;
            } else {
                // Insert before sentinel so it stays at the bottom
                var sentinel = document.getElementById('scroll-sentinel');
                if (sentinel) {
                    sentinel.insertAdjacentHTML('beforebegin', html);
                } else {
                    resultsDiv.insertAdjacentHTML('beforeend', html);
                }
            }
            renderedCount = end;

            // Remove sentinel if all loaded
            if (renderedCount >= allGroups.length) {
                var s = document.getElementById('scroll-sentinel');
                if (s) s.remove();
                if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
            }
        }

        renderBatch();

        // Set up infinite scroll if there are more groups
        if (renderedCount < allGroups.length) {
            var sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            sentinel.style.height = '1px';
            resultsDiv.appendChild(sentinel);

            if (scrollObserver) scrollObserver.disconnect();
            scrollObserver = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting && renderedCount < allGroups.length) {
                    renderBatch();
                    // Re-evaluate: if sentinel is still visible, keep rendering
                    var s = document.getElementById('scroll-sentinel');
                    if (s && renderedCount < allGroups.length) {
                        requestAnimationFrame(function checkMore() {
                            var rect = s.getBoundingClientRect();
                            if (rect.top < window.innerHeight + 400 && renderedCount < allGroups.length) {
                                renderBatch();
                                requestAnimationFrame(checkMore);
                            }
                        });
                    }
                }
            }, { rootMargin: '400px' });
            scrollObserver.observe(sentinel);
        }
    })
    .catch(function(err) {
        spinner.classList.remove('active');
        resultsDiv.innerHTML = '<div class="no-results">Грешка: ' + err.message + '</div>';
    });
}

// ── Cross reference ──

// ── Expand transcript ──
function toggleTranscript(videoId, containerId, btn) {
    var container = document.getElementById(containerId);
    var isOpen = container.classList.contains('open');

    if (isOpen) {
        container.classList.remove('open');
        btn.classList.remove('open');
        return;
    }

    btn.classList.add('open');

    if (!container.dataset.loaded) {
        container.classList.add('open');
        container.innerHTML = '<div class="ft-loading">Зареждане...</div>';

        var promise;
        if (transcriptCache[videoId]) {
            promise = Promise.resolve(transcriptCache[videoId]);
        } else {
            promise = fetch('/api/transcript?id=' + videoId)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    transcriptCache[videoId] = data;
                    return data;
                });
        }

        promise.then(function(data) {
            var formatted = formatTranscript(data, videoId);
            container.innerHTML = '<div class="ft-header">' +
                '<span class="ft-title">' + escapeHtml(data.title) + '</span>' +
                '<span class="ft-meta">' + data.segment_count + ' сегмента</span>' +
                '</div><div class="ft-body">' + formatted + '</div>';
            container.dataset.loaded = 'true';
        }).catch(function(err) {
            container.innerHTML = '<div class="ft-loading">Грешка: ' + err.message + '</div>';
        });
    } else {
        container.classList.add('open');
    }
}

function formatTranscript(data, videoId) {
    var snippets = data.snippets || [];
    if (snippets.length === 0) return '<p>Няма текст</p>';

    var query = currentQuery.toLowerCase();
    var html = '';
    var para = '';
    var paraStart = snippets[0].start;

    for (var i = 0; i < snippets.length; i++) {
        var s = snippets[i];
        if (s.start - paraStart > 30 && para) {
            html += buildParagraph(para, paraStart, videoId, query);
            para = '';
            paraStart = s.start;
        }
        para += s.text + ' ';
    }
    if (para.trim()) {
        html += buildParagraph(para, paraStart, videoId, query);
    }
    return html;
}

function buildParagraph(text, startSec, videoId, query) {
    var sec = Math.floor(startSec);
    var mm = String(Math.floor(sec / 60)).padStart(2, '0');
    var ss = String(sec % 60).padStart(2, '0');
    var url = 'https://www.youtube.com/watch?v=' + videoId + '&t=' + sec;

    var escaped = escapeHtml(text.trim());

    if (query) {
        var terms = query.split(/\s+/).filter(function(t) { return t.length > 1; });
        for (var i = 0; i < terms.length; i++) {
            var regex = new RegExp('(' + escapeRegex(terms[i]) + ')', 'gi');
            escaped = escaped.replace(regex, '<span class="highlight-term">$1</span>');
        }
    }

    return '<p><a class="ts-link" href="' + url + '" target="_blank" rel="noopener noreferrer">[' + mm + ':' + ss + ']</a>' + escaped + '</p>';
}

// ── Episodes page ──
var epSortField = 'chrono'; // 'chrono' or 'alpha'
var epSortDir = 'desc';     // 'asc' or 'desc'

function setEpSort(field) {
    if (epSortField === field) {
        epSortDir = epSortDir === 'asc' ? 'desc' : 'asc';
    } else {
        epSortField = field;
        epSortDir = field === 'chrono' ? 'desc' : 'asc';
    }
    var searchEl = document.getElementById('episodes-search');
    renderEpisodes(searchEl ? searchEl.value : undefined);
}

function renderEpisodes(filter) {
    if (!episodesData) return;
    var container = document.getElementById('episodes-list');
    var filtered = episodesData.slice(); // copy for sorting
    if (filter && filter.trim()) {
        var q = filter.trim().toLowerCase();
        filtered = filtered.filter(function(ep) {
            if (ep.title.toLowerCase().indexOf(q) !== -1) return true;
            var numMatch = ep.title.match(/\(Беседа\s+(\d+)\)/);
            if (numMatch && numMatch[1] === q) return true;
            if (ep.episode_number && String(ep.episode_number) === q) return true;
            return false;
        });
    }

    // Sort
    filtered.sort(function(a, b) {
        var cmp;
        if (epSortField === 'chrono') {
            cmp = (a.episode_number || 0) - (b.episode_number || 0);
        } else {
            cmp = a.title.localeCompare(b.title, 'bg');
        }
        return epSortDir === 'desc' ? -cmp : cmp;
    });

    var arrow = function(field) {
        if (epSortField !== field) return '';
        return epSortDir === 'asc' ? ' \u25B2' : ' \u25BC';
    };

    var html = '<div class="episodes-sticky">' +
        '<div class="episodes-header">' +
        '<h2>Всички епизоди</h2>' +
        '<span class="episodes-count">' + filtered.length + ' от ' + episodesData.length + ' епизода</span></div>' +
        '<input type="text" class="glass-search-input" id="episodes-search" placeholder="Търси по заглавие или номер на беседа..." ' +
        'value="' + escapeHtml(filter || '') + '" ' +
        'oninput="renderEpisodes(this.value)">' +
        '<div class="sort-controls">' +
        '<button class="sort-btn' + (epSortField === 'chrono' ? ' active' : '') + '" onclick="setEpSort(\'chrono\')">Хронологично' + arrow('chrono') + '</button>' +
        '<button class="sort-btn' + (epSortField === 'alpha' ? ' active' : '') + '" onclick="setEpSort(\'alpha\')">По азбучен ред' + arrow('alpha') + '</button>' +
        '</div>' +
        '</div>';

    filtered.forEach(function(ep) {
        var epId = 'ep-detail-' + ep.video_id;
        var playerId = 'ep-player-' + ep.video_id;
        var displayTitle = ep.title;
        // If title doesn't already have a Беседа number, show episode_number
        if (!/\(Беседа\s+\d+\)/.test(displayTitle) && ep.episode_number > 0) {
            displayTitle += ' (Беседа ' + ep.episode_number + ')';
        }
        html += '<div class="episode-card" data-video-id="' + ep.video_id + '" data-detail-id="' + epId + '" data-player-id="' + playerId + '">' +
            '<span class="episode-title" onclick="toggleEpisodeDetail(\'' + ep.video_id + '\', \'' + epId + '\', \'' + playerId + '\', this.parentElement)" style="cursor:pointer;flex:1">' + escapeHtml(displayTitle) + '</span>' +
            '<div class="episode-meta">' +
            '<span class="episode-segments">' + ep.segment_count + ' сегм.</span>' +
            '<a href="/episode/' + ep.video_id + '" class="group-btn" style="font-size:11px;padding:2px 8px;color:var(--accent);border-color:var(--accent)" onclick="event.stopPropagation()">Отвори</a>' +
            '</div></div>' +
            '<div class="yt-player-wrapper" id="' + playerId + '"></div>' +
            '<div class="full-transcript" id="' + epId + '"></div>';
    });
    container.innerHTML = html;
    // Restore focus to search input after re-render
    if (filter !== undefined) {
        var searchEl = document.getElementById('episodes-search');
        if (searchEl) {
            searchEl.focus();
            searchEl.setSelectionRange(searchEl.value.length, searchEl.value.length);
        }
    }
}

        fetch(MEILI_URL + '/indexes/' + INDEX + '/search', {

function buildCustomChip(term) {
    var chipId = 'custom-chip-' + term.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
    return '<span class="custom-chip" id="' + chipId + '" onclick="searchTopic(\'' + escapeAttr(term) + '\')">' +
        escapeHtml(term) +
        '<span class="count" id="count-' + chipId + '">...</span>' +
        '<span class="remove-chip" onclick="event.stopPropagation();removeCustomTopic(\'' + escapeAttr(term) + '\')">&times;</span>' +
        '</span>';

function loadCustomTopics() {
    try {
        var stored = localStorage.getItem('svetogled_custom_topics');
        return stored ? JSON.parse(stored) : [];

}

function saveCustomTopics(topics) {
    try { localStorage.setItem('svetogled_custom_topics', JSON.stringify(topics)); }
    catch(e) {}
}

function addCustomTopic() {
    var input = document.getElementById('custom-topic-input');
    var term = input.value.trim();
    if (!term) return;

    var topics = loadCustomTopics();
    if (topics.indexOf(term) === -1) {
        topics.push(term);
        saveCustomTopics(topics);
    }
    input.value = '';
    renderTopics();
}

function removeCustomTopic(term) {
    var topics = loadCustomTopics().filter(function(t) { return t !== term; });
    saveCustomTopics(topics);
    renderTopics();
}

// ── Export ──
function exportResults() {
    if (lastResults.length === 0) {
        alert('Няма резултати за експорт. Първо направете търсене.');
        return;
    }

    var query = currentQuery;
    var text = 'Търсене: "' + query + '"\nРезултати: ' + lastResults.length + '\n';
    text += '============================================================\n\n';

    var groups = new Map();
    lastResults.forEach(function(hit) {
        if (hit.text && hit.text.length > 1500) return;
        if (!groups.has(hit.video_id)) {
            groups.set(hit.video_id, { title: hit.title, segments: [] });
        }
        groups.get(hit.video_id).segments.push(hit);
    });

    groups.forEach(function(group, videoId) {
        text += '\n' + '──────────────────────────────────────────────────\n';
        text += group.title + '\n';
        text += 'https://www.youtube.com/watch?v=' + videoId + '\n';
        text += '──────────────────────────────────────────────────\n\n';

        group.segments.forEach(function(seg) {
            text += '[' + seg.timestamp + '] ' + seg.text + '\n';
            text += '  ' + seg.youtube_url + '\n\n';
        });
    });

    var blob = new Blob([text], { type: 'text/plain; charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'svetogled-search-' + query.replace(/\s+/g, '_') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
}

function hideGroup(videoId, title, btn) {

    group.style.transition = 'opacity 0.3s, max-height 0.4s, margin 0.3s';
    group.style.opacity = '0';

    setTimeout(function() {
        group.style.maxHeight = '0';
        group.style.overflow = 'hidden';
        group.style.marginBottom = '0';
    }, 50);
    setTimeout(function() {
        group.style.display = 'none';
    }, 400);

    hiddenGroups[videoId] = title;
    updateHiddenBar();
}

function restoreGroup(videoId) {
    delete hiddenGroups[videoId];
    updateHiddenBar();

    // Find the group element and show it
    var groups = document.querySelectorAll('.video-group');
    groups.forEach(function(g) {
        var dismissBtn = g.querySelector('.group-btn-dismiss');
        if (dismissBtn && dismissBtn.getAttribute('onclick').indexOf(videoId) !== -1) {
            g.style.display = '';
            g.style.opacity = '0';
            g.style.maxHeight = '';
            g.style.overflow = '';
            g.style.marginBottom = '';
            setTimeout(function() { g.style.opacity = '1'; }, 10);
        }
    });
}

function restoreAll() {
    Object.keys(hiddenGroups).forEach(function(vid) {
        restoreGroup(vid);
    });
}

function updateHiddenBar() {
    var bar = document.getElementById('hidden-bar');
    var label = document.getElementById('hidden-label');
    var chipsDiv = document.getElementById('hidden-chips');
    var count = Object.keys(hiddenGroups).length;

    bar.classList.add('visible');
    label.innerHTML = '<strong>' + count + '</strong> скрит' + (count === 1 ? ' епизод' : 'и епизода');

    var html = '';
    for (var vid in hiddenGroups) {

            '<span class="restore-icon">&#8634;</span>' + escapeHtml(shortTitle) + '</div>';

    html += '<button class="restore-all-btn" onclick="restoreAll()">Покажи всички</button>';

// ── YouTube player ──
var activePlayerId = null;

function playSegment(videoId, startSeconds, playerId) {
    var wrapper = document.getElementById(playerId);

    // If clicking same player that's open, close it
    if (activePlayerId === playerId && wrapper.classList.contains('open')) {
        wrapper.classList.remove('open');
        setTimeout(function() { wrapper.innerHTML = ''; }, 400);
        activePlayerId = null;
        return;
    }

    // Close any other open player
    if (activePlayerId && activePlayerId !== playerId) {
        var prev = document.getElementById(activePlayerId);
        if (prev) {
            prev.classList.remove('open');
            setTimeout(function() { prev.innerHTML = ''; }, 400);
        }
    }

    // Embed YouTube iframe starting at the timestamp
    wrapper.innerHTML = '<iframe src="https://www.youtube.com/embed/' + videoId +
        '?start=' + startSeconds + '&autoplay=1" ' +
        'allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    wrapper.classList.add('open');
    activePlayerId = playerId;

    // Scroll player into view
    setTimeout(function() {
        wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

// ── Helpers ──
function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function escapeAttr(text) {
    return text.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ── Keyboard shortcuts & navigation ──
// Modes: 'tabs' (nav bar), 'items' (cards/groups), 'transcript' (reading open text)
var navMode = 'items';
var navSelectedIdx = -1;
var navTabIdx = -1;
var transcriptScrollTarget = null;

function getNavigableItems() {
    var activePage = document.querySelector('.page.active');

    if (activePage.id === 'page-episodes') {

function selectItem(idx) {
    var items = getNavigableItems();

    idx = Math.max(0, Math.min(idx, items.length - 1));

    clearNavSelection();
    items[idx].classList.add('ep-selected');

            items[navSelectedIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

// Find the open transcript/detail container for the selected item
function getOpenTranscript(item) {
    if (!item) return null;
    // Search page: video-group has a .full-transcript sibling inside it
    var ft = item.querySelector('.full-transcript.open');
    if (ft) return ft;
    // Episodes page: detail is a sibling after the card
    var next = item.nextElementSibling;
    while (next) {
        if (next.classList.contains('full-transcript') && next.classList.contains('open')) return next;
        if (next.classList.contains('episode-card')) break;
        next = next.nextElementSibling;
    }
    return null;
}

// Toggle transcript for the currently selected item via keyboard
function keyboardToggleTranscript() {
    var items = getNavigableItems();
    var item = items[navSelectedIdx];
    if (!item) return;

    keyboardTriggeredClick = true;
    var activePage = document.querySelector('.page.active');
    if (activePage && activePage.id === 'page-episodes') {
        var titleEl = item.querySelector('.episode-title');
        if (titleEl) titleEl.click();
    } else {
        var expandBtn = item.querySelector('.group-btn-expand');
        if (expandBtn) expandBtn.click();
    }
    setTimeout(function() { keyboardTriggeredClick = false; }, 0);
}

// Check if the selected item has an open transcript
function isTranscriptOpen() {
    var items = getNavigableItems();
    return !!getOpenTranscript(items[navSelectedIdx]);
}

var activeFullscreenEl = null;

function goFullscreen(container) {
    var overlay = document.getElementById('fullscreen-overlay');
    var html = container.innerHTML;
    // Apply current search highlights to fullscreen text (skip if already highlighted)
    if (currentQuery && html.indexOf('highlight-term') === -1) {
        var terms = currentQuery.toLowerCase().split(/\s+/).filter(function(t) { return t.length > 1; });
        for (var i = 0; i < terms.length; i++) {
            var regex = new RegExp('(?![^<]*>)(' + escapeRegex(terms[i]) + ')', 'gi');
            html = html.replace(regex, '<span class="highlight-term">$1</span>');
        }
    }
    // Wrap content in a scrollable inner div
    overlay.innerHTML = '<div class="fullscreen-inner" id="fullscreen-inner">' + html + '</div>';
    overlay.classList.add('active');
    document.body.classList.add('fullscreen-active');
    overlay.scrollTop = 0;
    document.body.style.overflow = 'hidden';
    activeFullscreenEl = overlay;
    // Focus the overlay so it receives scroll events
    overlay.setAttribute('tabindex', '-1');
    overlay.focus();
    // Scroll to first highlighted term
    setTimeout(function() {
        var firstHit = overlay.querySelector('.highlight-term');
        if (firstHit) {
            firstHit.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 100);
    var hint = document.getElementById('fullscreen-hint');
    hint.classList.add('visible');
    setTimeout(function() { hint.classList.remove('visible'); }, 3000);
}

function openGroupFullscreen(videoId, containerId, btn) {
    var container = document.getElementById(containerId);
    if (!container) return;

    navMode = 'transcript';

    // Load transcript if not already loaded, then go fullscreen
    if (container.dataset.loaded) {
        container.style.display = 'block';
        container.style.maxHeight = 'none';
        container.style.opacity = '1';
        goFullscreen(container);
        container.style.display = '';
        container.style.maxHeight = '';
        container.style.opacity = '';
    } else {
        var promise;
        if (transcriptCache[videoId]) {
            promise = Promise.resolve(transcriptCache[videoId]);
        } else {
            promise = fetch('/api/transcript?id=' + videoId)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    transcriptCache[videoId] = data;
                    return data;
                });
        }
        promise.then(function(data) {
            if (navMode !== 'transcript') return;
            var formatted = formatTranscript(data, videoId);
            var html = '<div class="ft-header">' +
                '<span class="ft-title">' + escapeHtml(data.title) + '</span>' +
                '<span class="ft-meta">' + (data.segment_count || '') + ' сегмента</span>' +
                '</div><div class="ft-body">' + formatted + '</div>';
            container.innerHTML = html;
            container.dataset.loaded = 'true';
            goFullscreen(container);
        });
    }
}

function exitFullscreen() {
    var overlay = document.getElementById('fullscreen-overlay');
    overlay.classList.remove('active');
    document.body.classList.remove('fullscreen-active');
    overlay.innerHTML = '';
    activeFullscreenEl = null;
    document.body.style.overflow = '';
    document.getElementById('fullscreen-hint').classList.remove('visible');

    // Close the inline transcript so the page doesn't stay scrolled to it
    var items = getNavigableItems();
    if (items[navSelectedIdx]) {
        var ft = getOpenTranscript(items[navSelectedIdx]);
        if (ft) {
            ft.classList.remove('open');
            // Also reset the expand button arrow
            var expandBtn = items[navSelectedIdx].querySelector('.group-btn-expand');
            if (expandBtn) expandBtn.classList.remove('open');
        }
    }
}

// Close fullscreen button
document.getElementById('fullscreen-close-btn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    exitFullscreen();
    navMode = 'items';
    if (navSelectedIdx >= 0) scrollToSelected();
});

// Also close fullscreen when clicking outside the inner content
document.getElementById('fullscreen-overlay').addEventListener('click', function(e) {
    if (e.target === this) {
        exitFullscreen();
        navMode = 'items';
        if (navSelectedIdx >= 0) scrollToSelected();
    }
});

// Clear keyboard selection on any mouse click on cards/groups
// (but not clicks triggered programmatically by keyboard Enter)
var keyboardTriggeredClick = false;

document.addEventListener('click', function(e) {
    if (keyboardTriggeredClick) return;
    if (e.target.closest('.episode-card') || e.target.closest('.video-group')) {
        navSelectedIdx = -1;
        navMode = 'items';
        clearNavSelection();
        clearTabFocus();
    }
});

document.addEventListener('keydown', function(e) {
    var tag = (e.target.tagName || '').toLowerCase();
    var isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;

    // "/" to focus search (when not in an input)
    if (e.key === '/' && !isInput) {
        e.preventDefault();
        navMode = 'items';
        clearTabFocus();
        var activePage = document.querySelector('.page.active');
        if (activePage && activePage.id === 'page-episodes') {
            var epSearch = document.getElementById('episodes-search');
            if (epSearch) epSearch.focus();
        } else {
            searchInput.focus();
        }
        return;
    }

    // Escape — step back through modes, or blur input
    if (e.key === 'Escape') {
        e.preventDefault();
        if (isInput) {
            e.target.blur();
            return;
        }
        if (navMode === 'transcript') {
            exitFullscreen();
            navMode = 'items';
            scrollToSelected();
            return;
        }
        navMode = 'items';
        navSelectedIdx = -1;
        navTabIdx = -1;
        clearNavSelection();
        clearTabFocus();
        return;
    }

    // Arrow keys in input fields — blur input and start item navigation
    if (isInput && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        e.preventDefault();
        e.target.blur();
        navMode = 'items';
        clearTabFocus();
        var items = getNavigableItems();
        if (items.length === 0) return;
        if (navSelectedIdx < 0) {
            selectItem(0);
        } else if (e.key === 'ArrowDown') {
            selectItem(navSelectedIdx + 1);
        } else {
            selectItem(navSelectedIdx - 1);
        }
        return;
    }

    // Don't handle other keys when in input fields
    if (isInput) return;

    // ── Tab navigation mode (Left/Right at top level) ──
    var navBtns = document.querySelectorAll('.nav-btn');

    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        // Enter tabs mode or move within it
        if (navMode !== 'tabs' && navMode !== 'items') return;

        // If in items mode with no selection, or explicitly, switch to tabs
        navMode = 'tabs';
        clearNavSelection();
        navSelectedIdx = -1;
        e.preventDefault();

        if (navTabIdx < 0) {
            // Find currently active tab
            navBtns.forEach(function(b, i) { if (b.classList.contains('active')) navTabIdx = i; });
        }

        if (e.key === 'ArrowRight') {
            navTabIdx = Math.min(navTabIdx + 1, navBtns.length - 1);
        } else {
            navTabIdx = Math.max(navTabIdx - 1, 0);
        }

        clearTabFocus();
        navBtns[navTabIdx].classList.add('nav-focused');
        return;
    }

    // Enter in tabs mode — activate the focused tab
    if (e.key === 'Enter' && navMode === 'tabs' && navTabIdx >= 0) {
        e.preventDefault();
        clearTabFocus();
        navBtns[navTabIdx].click();
        navMode = 'items';
        navSelectedIdx = -1;
        return;
    }

    // ── Transcript reading mode (fullscreen overlay) ──
    if (navMode === 'transcript') {
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            var scrollEl = document.getElementById('fullscreen-overlay');
            if (scrollEl && scrollEl.classList.contains('active')) {
                var delta = e.key === 'ArrowDown' ? 150 : -150;
                scrollEl.scrollTop += delta;
            }
            return;
        }

        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            e.preventDefault();
            return;
        }

        if (e.key === 'Enter') {
            e.preventDefault();
            exitFullscreen();
            navMode = 'items';
            scrollToSelected();
            return;
        }

        if (e.key === 'Escape') {
            e.preventDefault();
            exitFullscreen();
            navMode = 'items';
            scrollToSelected();
            return;
        }

        if (e.key === 'Backspace') {
            e.preventDefault();
            exitFullscreen();
            navMode = 'items';
            // Fall through to backspace handler below
        } else {
            return;
        }
    }

    // ── Items navigation mode ──

    // Arrow Down/Up — navigate items
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        // If coming from tabs mode, enter items mode
        if (navMode === 'tabs') {
            if (e.key === 'ArrowDown') {
                navMode = 'items';
                clearTabFocus();
                navTabIdx = -1;
                selectItem(0);
                e.preventDefault();
            }
            return;
        }

        navMode = 'items';
        clearTabFocus();
        var items = getNavigableItems();
        if (items.length === 0) return;

        e.preventDefault();

        if (navSelectedIdx < 0) {
            // First press — select first item (not second!)
            selectItem(0);
        } else if (e.key === 'ArrowDown') {
            selectItem(navSelectedIdx + 1);
        } else {
            selectItem(navSelectedIdx - 1);
        }
        return;
    }

    // Enter — open transcript fullscreen
    if (e.key === 'Enter' && navSelectedIdx >= 0) {
        e.preventDefault();
        var wasOpen = isTranscriptOpen();
        if (wasOpen) {
            // Already open inline (from mouse click), go fullscreen with existing content
            navMode = 'transcript';
            var items = getNavigableItems();
            var ft = getOpenTranscript(items[navSelectedIdx]);
            if (ft) goFullscreen(ft);
        } else {
            // Load transcript silently (hidden) then go directly to fullscreen
            navMode = 'transcript';
            var savedIdx = navSelectedIdx;
            var items = getNavigableItems();
            var item = items[savedIdx];
            if (!item) return;

            // Find the transcript container and video ID
            var activePage = document.querySelector('.page.active');
            var videoId, containerId, container;

            if (activePage && activePage.id === 'page-episodes') {
                containerId = item.getAttribute('data-detail-id');
                videoId = item.getAttribute('data-video-id');
                container = document.getElementById(containerId);
            } else {
                videoId = item.getAttribute('data-video-id');
                containerId = item.getAttribute('data-transcript-id');
                container = document.getElementById(containerId);
            }

            if (!container || !videoId) return;

            // Load content into the container silently (don't open it visually)
            if (container.dataset.loaded) {
                // Already loaded, go straight to fullscreen
                container.style.display = 'block';
                container.style.maxHeight = 'none';
                container.style.opacity = '1';
                goFullscreen(container);
                container.style.display = '';
                container.style.maxHeight = '';
                container.style.opacity = '';
            } else {
                // Fetch and load, then fullscreen
                var promise;
                if (transcriptCache[videoId]) {
                    promise = Promise.resolve(transcriptCache[videoId]);
                } else {
                    promise = fetch('/api/transcript?id=' + videoId)
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            transcriptCache[videoId] = data;
                            return data;
                        });
                }
                promise.then(function(data) {
                    if (navMode !== 'transcript') return;
                    var formatted = formatTranscript(data, videoId);
                    var html = '<div class="ft-header">' +
                        '<span class="ft-title">' + escapeHtml(data.title) + '</span>' +
                        '<span class="ft-meta">' + (data.segment_count || '') + ' сегмента</span>' +
                        '</div><div class="ft-body">' + formatted + '</div>';
                    container.innerHTML = html;
                    container.dataset.loaded = 'true';
                    // Temporarily make content accessible for goFullscreen to read
                    container.style.display = 'block';
                    container.style.maxHeight = 'none';
                    container.style.opacity = '1';
                    goFullscreen(container);
                    // Reset back to collapsed
                    container.style.display = '';
                    container.style.maxHeight = '';
                    container.style.opacity = '';
                    container.classList.remove('open');
                }).catch(function() {
                    navMode = 'items';
                    document.body.style.overflow = '';
                });
            }
        }
        return;
    }

    // Backspace — hide current item, select next
    if (e.key === 'Backspace' && navSelectedIdx >= 0) {
        e.preventDefault();
        var items = getNavigableItems();
        var item = items[navSelectedIdx];
        if (!item) return;

        var savedIdx = navSelectedIdx;

        var activePage = document.querySelector('.page.active');
        if (activePage && activePage.id === 'page-search') {
            keyboardTriggeredClick = true;
            var dismissBtn = item.querySelector('.group-btn-dismiss');
            if (dismissBtn) dismissBtn.click();
            setTimeout(function() { keyboardTriggeredClick = false; }, 0);
        } else if (activePage && activePage.id === 'page-episodes') {
            item.style.display = 'none';
        }

        // Select next available item
        setTimeout(function() {
            var newItems = getNavigableItems();
            var visible = [];
            newItems.forEach(function(el, i) {
                if (el.offsetParent !== null && el.style.display !== 'none') visible.push(i);
            });
            if (visible.length === 0) {
                navSelectedIdx = -1;
                clearNavSelection();
            } else {
                var nextIdx = visible.find(function(i) { return i >= savedIdx; });
                if (nextIdx === undefined) nextIdx = visible[visible.length - 1];
                selectItem(nextIdx);
            }
        }, 450);
        return;
    }
});

// Reset selection when episodes re-render
var origRenderEpisodes = renderEpisodes;
renderEpisodes = function(filter) {
    navSelectedIdx = -1;
    navMode = 'items';
    origRenderEpisodes(filter);
};
